<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="weight-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#888888"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="iron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#121212" rx="16" />
  
  <circle cx="400" cy="300" r="280" fill="url(#weight-glow)" />

  <!-- Technical grid dots -->
  <g opacity="0.1" fill="#ffffff">
    <circle cx="100" cy="100" r="2" /><circle cx="200" cy="100" r="2" /><circle cx="300" cy="100" r="2" /><circle cx="400" cy="100" r="2" /><circle cx="500" cy="100" r="2" /><circle cx="600" cy="100" r="2" /><circle cx="700" cy="100" r="2" />
    <circle cx="100" cy="200" r="2" /><circle cx="200" cy="200" r="2" /><circle cx="300" cy="200" r="2" /><circle cx="400" cy="200" r="2" /><circle cx="500" cy="200" r="2" /><circle cx="600" cy="200" r="2" /><circle cx="700" cy="200" r="2" />
    <circle cx="100" cy="300" r="2" /><circle cx="200" cy="300" r="2" /><circle cx="300" cy="300" r="2" /><circle cx="400" cy="300" r="2" /><circle cx="500" cy="300" r="2" /><circle cx="600" cy="300" r="2" /><circle cx="700" cy="300" r="2" />
    <circle cx="100" cy="400" r="2" /><circle cx="200" cy="400" r="2" /><circle cx="300" cy="400" r="2" /><circle cx="400" cy="400" r="2" /><circle cx="500" cy="400" r="2" /><circle cx="600" cy="400" r="2" /><circle cx="700" cy="400" r="2" />
    <circle cx="100" cy="500" r="2" /><circle cx="200" cy="500" r="2" /><circle cx="300" cy="500" r="2" /><circle cx="400" cy="500" r="2" /><circle cx="500" cy="500" r="2" /><circle cx="600" cy="500" r="2" /><circle cx="700" cy="500" r="2" />
  </g>

  <!-- Giant Hex Dumbbell Cross Group -->
  <g transform="translate(400, 300) rotate(25)">
    <!-- Dumbbell 1 (Horizontalish after rotation) -->
    <!-- Handle -->
    <rect x="-160" y="-14" width="320" height="28" fill="url(#chrome)" rx="2" stroke="#111111" stroke-width="2" />
    <!-- Handle Knurling / Grips -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#111111" stroke-width="28" stroke-dasharray="2 3" opacity="0.3" />

    <!-- Left Plates (Hexagon) -->
    <polygon points="-160,-75 -220,-45 -220,45 -160,75 -100,45 -100,-45" fill="url(#iron)" stroke="#ef4444" stroke-width="3" />
    <polygon points="-160,-65 -210,-38 -210,38 -160,65 -110,38 -110,-38" fill="#171717" stroke="#262626" stroke-width="1" />
    <!-- Right Plates -->
    <polygon points="160,-75 220,-45 220,45 160,75 100,45 100,-45" fill="url(#iron)" stroke="#ef4444" stroke-width="3" />
    <polygon points="160,-65 210,-38 210,38 160,65 110,38 110,-38" fill="#171717" stroke="#262626" stroke-width="1" />
    
    <!-- Weight Emboss -->
    <text x="-160" y="8" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#606060" text-anchor="middle">50</text>
    <text x="160" y="8" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#606060" text-anchor="middle">KG</text>
  </g>

  <g transform="translate(400, 300) rotate(-35)">
    <!-- Dumbbell 2 (Verticalish after rotation) -->
    <rect x="-130" y="-11" width="260" height="22" fill="url(#chrome)" rx="2" stroke="#111111" stroke-width="1.5" />
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#111111" stroke-width="22" stroke-dasharray="2 3" opacity="0.3" />

    <polygon points="-130,-55 -180,-30 -180,30 -130,55 -80,30 -80,-30" fill="url(#iron)" stroke="#444444" stroke-width="2.5" />
    <polygon points="130,-55 180,-30 180,30 130,55 80,30 80,-30" fill="url(#iron)" stroke="#444444" stroke-width="2.5" />
  </g>

  <!-- Info Label -->
  <text x="50" y="80" font-family="'Inter', sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="2">FREE WEIGHTS</text>
  <text x="50" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#ef4444" letter-spacing="4">SOLID IRON &amp; CHROME STEEL</text>
</svg>
