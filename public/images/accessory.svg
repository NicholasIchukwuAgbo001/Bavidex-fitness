<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="acc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flask-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#121212" rx="16" />
  
  <circle cx="400" cy="300" r="280" fill="url(#acc-glow)" />

  <!-- Diagonal high-intensity grid lines -->
  <g stroke="#262626" stroke-width="1.5">
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
  </g>

  <!-- Vector Water Shaker Bottle and Towel (Hydration focus) -->
  <g transform="translate(250, 100)">
    <!-- Towel draped in background -->
    <path d="M 60 280 Q 150 320 280 270 L 310 320 Q 150 380 30 310 Z" fill="#262626" stroke="#404040" stroke-width="2" />
    <path d="M 60 280 Q 150 320 280 270" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.5" />
    
    <!-- Shaker Cup Body -->
    <path d="M 120 120 L 140 330 Q 142 345 160 345 L 220 345 Q 238 345 240 330 L 260 120 Z" fill="url(#flask-grad)" stroke="#111111" stroke-width="3" />
    
    <!-- Measuring Scale On Shaker -->
    <g stroke="#ffffff" stroke-width="2" opacity="0.4">
      <line x1="190" y1="160" x2="210" y2="160" /><text x="215" y="164" font-family="sans-serif" font-size="10" fill="#fff">600ml</text>
      <line x1="190" y1="200" x2="205" y2="200" />
      <line x1="190" y1="240" x2="210" y2="240" /><text x="215" y="244" font-family="sans-serif" font-size="10" fill="#fff">400ml</text>
      <line x1="190" y1="280" x2="205" y2="280" />
      <line x1="190" y1="320" x2="210" y2="320" /><text x="215" y="324" font-family="sans-serif" font-size="10" fill="#fff">200ml</text>
    </g>

    <!-- Shaker Lid / Cap -->
    <rect x="110" y="95" width="160" height="25" fill="#0c0c0c" rx="6" />
    <rect x="135" y="70" width="110" height="25" fill="#171717" rx="4" stroke="#ef4444" stroke-width="2" />
    
    <!-- Pop cap loop / holder -->
    <path d="M 220 75 Q 250 75 250 90 Q 250 100 225 100" fill="none" stroke="#ef4444" stroke-width="6" stroke-linecap="round" />
    <circle cx="225" cy="100" r="3" fill="#ffffff" />
  </g>

  <!-- Title Overlay -->
  <text x="50" y="80" font-family="'Inter', sans-serif" font-weight="900" font-size="28" fill="#ffffff" letter-spacing="2">ACCESSORIES</text>
  <text x="50" y="110" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#ef4444" letter-spacing="4">SHAKERS, HYDRATION &amp; STRAPS</text>
</svg>
